<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none" role="img" aria-label="Agents IA en 2026 : des prospects captés automatiquement passent dans un tunnel de prospection piloté par l'IA, puis remplissent un agenda de rendez-vous clients en pilote automatique.">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBFAFF"/>
      <stop offset="1" stop-color="#ECE6FF"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8B6BF5"/>
      <stop offset="1" stop-color="#5A32D6"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7C55F0" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#7C55F0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid2" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#6B47E8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg2)"/>
  <rect width="1200" height="630" fill="url(#grid2)"/>
  <circle cx="600" cy="315" r="320" fill="url(#glow2)"/>

  <!-- Etape 1 : prospects captes -->
  <g>
    <text x="188" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#6B47E8">Prospects</text>
    <g>
      <g transform="translate(120,196)">
        <circle cx="34" cy="34" r="34" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.25"/>
        <circle cx="34" cy="26" r="12" fill="#6B47E8" fill-opacity="0.55"/>
        <path d="M14 52 a20 18 0 0 1 40 0 Z" fill="#6B47E8" fill-opacity="0.35"/>
      </g>
      <g transform="translate(210,180)">
        <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.2"/>
        <circle cx="30" cy="23" r="10" fill="#6B47E8" fill-opacity="0.45"/>
        <path d="M13 45 a17 15 0 0 1 34 0 Z" fill="#6B47E8" fill-opacity="0.28"/>
      </g>
      <g transform="translate(132,290)">
        <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.2"/>
        <circle cx="30" cy="23" r="10" fill="#6B47E8" fill-opacity="0.45"/>
        <path d="M13 45 a17 15 0 0 1 34 0 Z" fill="#6B47E8" fill-opacity="0.28"/>
      </g>
      <g transform="translate(214,300)">
        <circle cx="34" cy="34" r="34" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.25"/>
        <circle cx="34" cy="26" r="12" fill="#6B47E8" fill-opacity="0.5"/>
        <path d="M14 52 a20 18 0 0 1 40 0 Z" fill="#6B47E8" fill-opacity="0.32"/>
      </g>
      <g transform="translate(150,400)">
        <circle cx="30" cy="30" r="30" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.18"/>
        <circle cx="30" cy="23" r="10" fill="#6B47E8" fill-opacity="0.4"/>
        <path d="M13 45 a17 15 0 0 1 34 0 Z" fill="#6B47E8" fill-opacity="0.24"/>
      </g>
    </g>
  </g>

  <!-- Flux vers le tunnel -->
  <g stroke="url(#acc2)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-opacity="0.55">
    <path d="M300 230 C 380 250, 430 290, 470 305"/>
    <path d="M300 320 C 380 320, 430 316, 470 315"/>
    <path d="M300 425 C 380 400, 430 340, 470 325"/>
  </g>

  <!-- Etape 2 : le tunnel / agent IA (entonnoir) -->
  <text x="600" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#6B47E8">Agents IA — prospection &amp; relances</text>
  <g transform="translate(474,186)">
    <path d="M0 0 H252 L162 132 V236 L90 268 V132 Z" fill="#FFFFFF" stroke="url(#acc2)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M0 0 H252 L162 132 V236 L90 268 V132 Z" fill="url(#acc2)" fill-opacity="0.08"/>
    <!-- niveaux de l'entonnoir -->
    <line x1="34" y1="52" x2="218" y2="52" stroke="#6B47E8" stroke-opacity="0.25" stroke-width="2"/>
    <line x1="66" y1="98" x2="186" y2="98" stroke="#6B47E8" stroke-opacity="0.25" stroke-width="2"/>
    <!-- petites icones d'automatisation -->
    <g transform="translate(112,20)" fill="url(#acc2)">
      <path d="M14 0 a14 14 0 0 1 0 28 a14 14 0 0 1 0 -28 Z M14 6 a8 8 0 0 0 0 16 a8 8 0 0 0 0 -16 Z"/>
      <g stroke="#5A32D6" stroke-width="3.5" stroke-linecap="round">
        <line x1="14" y1="-4" x2="14" y2="1"/><line x1="14" y1="27" x2="14" y2="32"/>
        <line x1="-4" y1="14" x2="1" y2="14"/><line x1="27" y1="14" x2="32" y2="14"/>
      </g>
    </g>
  </g>

  <!-- Boucle "pilote automatique" -->
  <g transform="translate(600,470)">
    <path d="M-30 0 a30 30 0 1 1 9 21" fill="none" stroke="url(#acc2)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M-24 26 l3 -14 l13 6 Z" fill="url(#acc2)"/>
    <text x="52" y="6" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1A1626" fill-opacity="0.7">Pilote automatique</text>
  </g>

  <!-- Flux vers l'agenda -->
  <g stroke="url(#acc2)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-opacity="0.6">
    <path d="M642 318 C 720 318, 780 300, 838 292"/>
    <path d="M636 322 C 720 340, 780 360, 838 372"/>
  </g>

  <!-- Etape 3 : agenda rempli de rendez-vous -->
  <text x="988" y="150" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#6B47E8">Rendez-vous clients</text>
  <g transform="translate(838,196)">
    <rect x="0" y="0" width="264" height="238" rx="20" fill="#FFFFFF" stroke="#6B47E8" stroke-opacity="0.25"/>
    <rect x="0" y="0" width="264" height="52" rx="20" fill="url(#acc2)"/>
    <rect x="0" y="32" width="264" height="20" fill="url(#acc2)"/>
    <circle cx="40" cy="26" r="7" fill="#FFFFFF"/><circle cx="72" cy="26" r="7" fill="#FFFFFF"/>
    <text x="150" y="33" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Votre agenda</text>
    <!-- creneaux -->
    <g>
      <rect x="22" y="74" width="220" height="34" rx="9" fill="#6B47E8" fill-opacity="0.12"/>
      <circle cx="42" cy="91" r="9" fill="url(#acc2)"/>
      <path d="M37 91 l3 3 l6 -7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="60" y="87" width="120" height="8" rx="4" fill="#1A1626" fill-opacity="0.45"/>

      <rect x="22" y="118" width="220" height="34" rx="9" fill="#6B47E8" fill-opacity="0.12"/>
      <circle cx="42" cy="135" r="9" fill="url(#acc2)"/>
      <path d="M37 135 l3 3 l6 -7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="60" y="131" width="98" height="8" rx="4" fill="#1A1626" fill-opacity="0.45"/>

      <rect x="22" y="162" width="220" height="34" rx="9" fill="#6B47E8" fill-opacity="0.12"/>
      <circle cx="42" cy="179" r="9" fill="url(#acc2)"/>
      <path d="M37 179 l3 3 l6 -7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="60" y="175" width="134" height="8" rx="4" fill="#1A1626" fill-opacity="0.45"/>
    </g>
  </g>

  <!-- badge marque -->
  <g transform="translate(96,540)">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="#1A1626"/>
    <circle cx="24" cy="20" r="9" fill="none" stroke="#8B6BF5" stroke-width="2.5"/>
    <path d="M20 20 l3 3 l6 -7" stroke="#8B6BF5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="44" y="26" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Konig IA</text>
  </g>
  <text x="1104" y="566" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#6B47E8" fill-opacity="0.9">Acquisition client IA 2026</text>
</svg>
